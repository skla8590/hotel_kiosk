<!DOCTYPE html>
<!--
  layout.html
  모든 관리자 페이지가 th:replace 로 가져가는 공통 레이아웃 프래그먼트
  사용법: <html th:replace="~{admin/layout/layout :: page(title='페이지명', content=~{::main})}">
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="page(title, content, pageScript)"
      lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — Hotel Admin'">Hotel Admin</title>

    <!-- Spring Security CSRF (fetch / $.ajax 헤더 삽입용) -->
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap"
          rel="stylesheet">

    <!-- Admin CSS -->
    <link rel="stylesheet" th:href="@{/css/admin/layout.css}">
    <link rel="stylesheet" th:href="@{/css/admin/components.css}">
    <link rel="stylesheet" th:href="@{/css/admin/modal.css}">
</head>
<body>
<div class="app">

    <!-- ══ 사이드바 ══ -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-name">HOTEL<br>ADMIN</div>
            <div class="brand-sub">키오스크 관리 시스템</div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">메인</div>
            <a class="nav-item" th:href="@{/admin/dashboard}"
               th:classappend="${currentMenu == 'dashboard'} ? 'active'"
               sec:authorize="hasAnyRole('SUPER', 'GENERAL')">
                <span class="nav-icon">⊞</span> 대시보드
            </a>

            <div class="nav-section">운영</div>
            <a class="nav-item" th:href="@{/admin/reservation}"
               th:classappend="${currentMenu == 'reservation'} ? 'active'"
               sec:authorize="hasAnyRole('SUPER', 'GENERAL')">
                <span class="nav-icon">📋</span> 예약 관리
            </a>
            <a class="nav-item" th:href="@{/admin/room}"
               th:classappend="${currentMenu == 'room'} ? 'active'"
               sec:authorize="hasAnyRole('SUPER', 'GENERAL')">
                <span class="nav-icon">🏨</span> 객실 관리
            </a>
            <a class="nav-item" th:href="@{/admin/customer}"
               th:classappend="${currentMenu == 'customer'} ? 'active'"
               sec:authorize="hasAnyRole('SUPER', 'GENERAL')">
                <span class="nav-icon">👤</span> 고객 정보
            </a>
            <a class="nav-item" th:href="@{/admin/stock}"
               th:classappend="${currentMenu == 'stock'} ? 'active'"
               sec:authorize="hasAnyRole('SUPER', 'GENERAL')">
                <span class="nav-icon">📦</span> 재고 관리
                <span class="nav-badge" th:if="${stockAlertCount != null and stockAlertCount > 0}"
                      th:text="${stockAlertCount}"></span>
            </a>


            <div class="nav-section">관리</div>
            <a class="nav-item" th:href="@{/admin/policy}"
               th:classappend="${currentMenu == 'policy'} ? 'active'"
               sec:authorize="hasAnyRole('SUPER', 'GENERAL')">
                <span class="nav-icon">⚙</span> 정책 설정
            </a>
            <!-- 최고 관리자만 통계·계정 메뉴 표시 -->
            <a class="nav-item" th:href="@{/admin/statistic}"
               th:classappend="${currentMenu == 'statistic'} ? 'active'"
               sec:authorize="hasAnyRole('SUPER')">
                <span class="nav-icon">📊</span> 통계·리포트
            </a>
            <a class="nav-item" th:href="@{/admin/account}"
               th:classappend="${currentMenu == 'account'} ? 'active'"
               sec:authorize="hasAnyRole('SUPER')">
                <span class="nav-icon">👥</span> 계정 관리
            </a>
        </nav>

        <!-- 유저 영역 -->
        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar"
                     th:text="${#strings.substring(adminName, 0, 1)}">홍
                </div>
                <div>
                    <div class="user-name" th:text="${adminId}">superadmin1</div>
                    <div class="user-role" th:text="${adminRole == 'SUPER'} ? '최고 관리자' : '일반 관리자'">최고 관리자</div>
                </div>
            </div>
            <div class="sidebar-btns">
                <a class="sidebar-btn" th:href="@{/admin/mypage}">MyPage</a>
                <button class="sidebar-btn" onclick="openModal('modal-logout')">LogOut</button>
            </div>
        </div>
    </aside><!-- /sidebar -->

    <!-- ══ 메인 ══ -->
    <div class="main">
        <!-- 상단 헤더 -->
        <header class="topbar">
            <div class="topbar-left">
                <span id="page-title" class="page-title" th:text="${title}">대시보드</span>
            </div>
            <div class="topbar-right">
                <span class="topbar-time" id="clock"></span>
                <button class="topbar-icon-btn" title="알림">
                    🔔<span class="notif-dot"
                           th:if="${stockAlertCount != null and stockAlertCount > 0}"></span>
                </button>
            </div>
        </header>

        <!-- 페이지 콘텐츠 (각 페이지의 <main> 이 들어옴) -->
        <div class="content">
            <th:block th:replace="${content}"/>
        </div>
    </div><!-- /main -->

</div><!-- /app -->

<!-- ══ 공통 모달 ══ -->

<!-- 로그아웃 확인 -->
<div class="overlay" id="modal-logout">
    <div class="modal modal-sm modal-alert">
        <div class="modal-body">
            <span class="alert-ico">🚪</span>
            <div class="alert-msg">로그아웃 하시겠습니까?</div>
            <div class="alert-sub">현재 작업 중인 내용이 저장되지 않을 수 있습니다.</div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-ghost" onclick="closeModal('modal-logout')">취소</button>
            <!-- Spring Security 로그아웃 폼 POST -->
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-primary">로그아웃</button>
            </form>
        </div>
    </div>
</div>

<!-- 권한 없음 -->
<div class="overlay" id="modal-perm-denied">
    <div class="modal modal-sm modal-alert">
        <div class="modal-body">
            <span class="alert-ico">🔒</span>
            <div class="alert-msg">접근 권한이 없습니다</div>
            <div class="alert-sub">해당 기능은 최고 관리자만 사용할 수 있습니다.</div>
        </div>
        <div class="modal-foot" style="justify-content:center">
            <button class="btn btn-primary" onclick="closeModal('modal-perm-denied')">확인</button>
        </div>
    </div>
</div>

<!-- 로그인 5회 실패 -->
<div class="overlay" id="modal-login-fail">
    <div class="modal modal-sm modal-alert">
        <div class="modal-body">
            <span class="alert-ico">🔐</span>
            <div class="alert-msg">로그인 5회 실패</div>
            <div class="alert-sub">계정이 잠겼습니다.<br>최고 관리자에게 문의해주세요.</div>
        </div>
        <div class="modal-foot" style="justify-content:center">
            <button class="btn btn-primary" onclick="closeModal('modal-login-fail')">확인</button>
        </div>
    </div>
</div>

<div id="modal-alert" class="overlay">
    <div class="modal modal-sm">

        <div class="modal-body">
            <span class="alert-ico"></span>
            <p id="modal-alert-msg" class="alert-msg"></p>
        </div>

        <div class="modal-foot">
            <button id="modal-alert-confirm" onclick="closeModal('modal-alert')" class="btn btn-primary">
                확인
            </button>
        </div>
    </div>
</div>

<div id="modal-stock-alert" class="overlay">
    <div class="modal modal-sm">

        <div class="modal-body">
            <span class="alert-ico"></span>
            <p id="modal-stock-alert-msg" class="alert-msg"></p>
        </div>

        <div class="modal-foot">
            <button onclick="closeStockModal('modal-stock-alert')" class="btn btn-primary">
                확인
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<!-- Admin JS -->
<!-- 공통 JS -->
<script src="/js/admin/main.js"></script>

<script>
    (function () {
        const path = window.location.pathname;
        const page = path.split('/').pop();

        document.body.dataset.page = page;
    })();
</script>

<script>
    (function () {
        const path = window.location.pathname;

        // /admin/policy → policy
        const page = path.split('/').pop();

        document.body.dataset.page = page;

        if (!page) return;

        const script = document.createElement('script');
        script.src = `/js/admin/${page}.js`;

        script.onerror = () => {
            console.warn(`${script.src} 없음`);
        };

        document.body.appendChild(script);
    })();
</script>
</body>
</html>
