<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{admin/layout/layout :: page(title='객실 관리', content=~{::main}, pageScript=~{::script})}">
<head></head>
<body>
<main>

    <div class="toolbar">
        <div class="search-wrap">
            <span class="ico">🔍</span>
            <input type="text" id="room-keyword" placeholder="객실번호 / 객실명 검색">
        </div>
        <select id="room-type-filter" class="flt-select">
            <option value="">객실 타입 전체</option>
            <option value="Standard">스탠다드</option>
            <option value="Superior">슈페리어</option>
            <option value="Deluxe">디럭스</option>
            <option value="Suite">스위트</option>
        </select>
        <button class="btn btn-primary" onclick="room.search()">검색</button>
        <!-- 최고 관리자만 등록 버튼 노출 -->
        <button class="btn btn-gold ml-auto"
                sec:authorize="hasRole('SUPER')"
                onclick="openModal('modal-room-reg')">+ 객실 등록
        </button>
        <!-- 일반 관리자: 클릭 시 권한 없음 모달 -->
        <button class="btn btn-gold ml-auto"
                sec:authorize="!hasRole('SUPER')"
                onclick="openModal('modal-perm-denied')">+ 객실 등록
        </button>
    </div>

    <div class="card">
        <div class="card-head">
            <span class="card-title">객실 상태 현황</span>
            <div style="display:flex;gap:10px;font-size:12px;color:var(--c-txt-3)">
                <span>🟦 체크인</span><span>🟧 체크아웃대기</span>
                <span>🟨 청소중</span><span>🟥 점검중</span><span>⬜ 공실</span>
            </div>
        </div>
        <div class="card-body">

            <!-- 층 탭 (서버에서 floors 리스트 받음) -->
            <div class="floor-tabs">
                <button th:each="f, stat : ${floors}"
                        class="floor-tab"
                        th:classappend="${stat.first} ? 'active'"
                        th:data-floor="${f}"
                        th:text="${f} + 'F'"
                        onclick="room.switchFloor(this)">11F
                </button>
            </div>

            <!-- 객실 카드 그리드 (초기값: 서버 렌더, 이후 AJAX 교체) -->
            <div class="room-grid" id="room-grid">
                <!--<div th:each="r : ${rooms}"
                     class="room-card"
                     th:classappend="${r.status == 'CHECKIN'  ? 'checkin'  :
                                       r.status == 'CHECKOUT' ? 'checkout' :
                                       r.status == 'CLEANING' ? 'cleaning' :
                                       r.status == 'INSPECT'  ? 'inspect'  : ''}"
                     th:onclick="'room.openDetail(\'' + ${r.id} + '\')'">
                  <div class="room-num"   th:text="${r.roomNo}">1101</div>
                  <div class="room-type"  th:text="${r.roomName}">스탠다드 시티</div>
                  <div class="room-price"
                       th:text="'인원 ' + ${r.maxPeople} + '명 · ₩' + ${#numbers.formatInteger(r.basePrice,1,'COMMA')}">인원 2명 · ₩150,000</div>
                  <div class="room-status">
                    <span class="room-chip"
                          th:classappend="${r.status == 'CHECKIN'  ? 'chip-checkin'  :
                                            r.status == 'CHECKOUT' ? 'chip-checkout' :
                                            r.status == 'CLEANING' ? 'chip-cleaning' :
                                            r.status == 'INSPECT'  ? 'chip-inspect'  : 'chip-empty'}"
                          th:text="${r.status == 'CHECKIN'  ? '체크인'     :
                                     r.status == 'CHECKOUT' ? '체크아웃대기' :
                                     r.status == 'CLEANING' ? '청소중'     :
                                     r.status == 'INSPECT'  ? '점검중'     : '공실'}">체크인</span>
                  </div>
                </div>-->
            </div>
        </div>
    </div>

    <!-- ══ 객실 등록 모달 ══ -->
    <div class="overlay" id="modal-room-reg">
        <div class="modal modal-md">
            <div class="modal-head">
                <span class="modal-title">객실 등록</span>
                <button class="modal-close" onclick="closeModal('modal-room-reg')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-grid">
                    <div class="fg"><label class="lbl">객실 호수</label>
                        <input class="inp" id="reg-room-no" placeholder="예: 1101"></div>
                    <div class="fg"><label class="lbl">객실명</label>
                        <input class="inp" id="reg-room-name" placeholder="예: 스탠다드 시티"></div>
                    <div class="fg"><label class="lbl">객실 종류</label>
                        <select class="sel" id="reg-room-type">
                            <option value="Standard">스탠다드</option>
                            <option value="Superior">슈페리어</option>
                            <option value="Deluxe">디럭스</option>
                            <option value="Suite">스위트</option>
                            <!--              <option>로얄</option>-->
                        </select></div>
                    <div class="fg"><label class="lbl">객실 뷰</label>
                        <select class="sel" id="reg-room-view">
                            <option value="City">시티</option>
                            <option value="Ocean">오션</option>
                            <option value="Mountain">마운틴</option>
                            <option value="Lake">레이크</option>
                        </select></div>
                    <div class="fg"><label class="lbl">이용 금액 (원)</label>
                        <input type="number" class="inp" id="reg-room-price" placeholder="150000"></div>
                    <div class="fg"><label class="lbl">제한 인원</label>
                        <input type="number" class="inp" id="reg-room-people" placeholder="2"></div>
                    <div class="fg"><label class="lbl">침대 옵션</label>
                        <input class="sel" id="reg-room-bed" placeholder="더블 1"></div>
                    <div class="fg"><label class="lbl">객실 면적 (㎡)</label>
                        <input type="number" class="inp" id="reg-room-area" placeholder="26"></div>
                    <div class="fg full"><label class="lbl">객실 상태</label>
                        <select class="sel" id="reg-room-status">
                            <option value="Available">공실</option>
                            <option value="Maintenance">점검중</option>
                        </select></div>
                </div>
            </div>
            <div class="modal-foot">
                <button class="btn btn-ghost" onclick="closeModal('modal-room-reg')">취소</button>
                <button class="btn btn-gold" onclick="room.register()">등록</button>
            </div>
        </div>
    </div>

    <!-- 등록 완료 알림 -->
    <div class="overlay" id="modal-room-reg-done">
        <div class="modal modal-sm modal-alert">
            <div class="modal-body">
                <span class="alert-ico">✅</span>
                <div class="alert-msg">객실 등록 완료</div>
                <div class="alert-sub">새 객실이 성공적으로 등록되었습니다.</div>
            </div>
            <div class="modal-foot" style="justify-content:center">
                <button class="btn btn-gold" onclick="closeModal('modal-room-reg-done')">확인</button>
            </div>
        </div>
    </div>

    <!-- ══ 객실 상세 모달 ══ -->
    <div class="overlay" id="modal-room-detail">
        <div class="modal modal-md">
            <div class="modal-head">
                <span class="modal-title" id="room-detail-title">객실 정보</span>
                <button class="modal-close" onclick="closeModal('modal-room-detail')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-grid col2">
                    <div>
                        <div class="lbl">객실호수</div>
                        <div class="fw700 mt-4" id="rd-no" style="font-size:15px"></div>
                    </div>
                    <div>
                        <div class="lbl">객실명</div>
                        <input class="mt-4" id="rd-name" th:attr="readonly=${!#authorization.expression('hasRole(''SUPER'')')}"></div>
                    <div>
                        <div class="lbl">객실종류</div>
                        <select class="mt-4" id="rd-type" th:attr="disabled=${!#authorization.expression('hasRole(''SUPER'')')}">
                            <option value="Standard">스탠다드</option>
                            <option value="Superior">슈페리어</option>
                            <option value="Deluxe">디럭스</option>
                            <option value="Suite">스위트</option>
                            <!--              <option>로얄</option>-->
                        </select></div>
                    <div>
                        <div class="lbl">객실 뷰</div>
                        <select class="mt-4" id="rd-view" th:attr="disabled=${!#authorization.expression('hasRole(''SUPER'')')}">
                            <option value="City">시티</option>
                            <option value="Ocean">오션</option>
                            <option value="Mountain">마운틴</option>
                            <option value="Lake">레이크</option>
                        </select></div>
                    <div>
                        <div class="lbl">이용금액</div>
                        <input type="number" class="fw700 mt-4" id="rd-price" style="color:var(--c-blue)" th:attr="readonly=${!#authorization.expression('hasRole(''SUPER'')')}"></div>
                    <div>
                        <div class="lbl">제한인원</div>
                        <input type="number" class="mt-4" id="rd-people" th:attr="readonly=${!#authorization.expression('hasRole(''SUPER'')')}"></div>
                    <div>
                        <div class="lbl">침대옵션</div>
                        <input type="text" class="mt-4" id="rd-bed" th:attr="readonly=${!#authorization.expression('hasRole(''SUPER'')')}">
                    </div>
                    <div>
                        <div class="lbl">객실면적</div>
                        <input type="number" class="mt-4" id="rd-area" th:attr="readonly=${!#authorization.expression('hasRole(''SUPER'')')}"></div>
                    <div>
                        <div class="lbl">상태</div>
                        <select class="mt-4" id="rd-status">
                            <option value="Available">공실</option>
                            <option value="Maintenance">점검중</option>
                            <option value="Cleaning">청소중</option>
                            <option value="Cleaning Required">체크아웃대기</option>
                            <option value="Occupied">체크인</option>
                        </select></div>
                </div>
            </div>
            <div class="modal-foot">
                <button class="btn btn-danger"
                        sec:authorize="hasRole('SUPER_ADMIN')"
                        onclick="room.remove(currentRoomId);closeModal('modal-room-detail')">삭제
                </button>
                <button class="btn btn-ghost" onclick="closeModal('modal-room-detail')">취소</button>
                <button class="btn btn-gold" onclick="room.modify()">수정</button>
            </div>
        </div>
    </div>

    <!-- 삭제 불가 (예약 존재) -->
    <div class="overlay" id="modal-room-delete-check">
        <div class="modal modal-sm modal-alert">
            <div class="modal-body">
                <span class="alert-ico">⚠️</span>
                <div class="alert-msg">객실 삭제 불가</div>
                <div class="alert-sub">예약 내역이 존재하여 삭제할 수 없습니다.<br>예약을 먼저 처리해주세요.</div>
            </div>
            <div class="modal-foot" style="justify-content:center">
                <button class="btn btn-primary" onclick="closeModal('modal-room-delete-check')">확인</button>
            </div>
        </div>
    </div>

</main>
</body>
</html>
