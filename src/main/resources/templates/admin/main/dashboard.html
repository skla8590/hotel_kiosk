<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout/layout :: page(title='대시보드', content=~{::main}, pageScript=~{::script})}">
<head></head>
<body>
<main>

  <!-- KPI 카드 4개 -->
  <div class="kpi-grid">
    <div class="kpi-card gold">
      <div class="kpi-label">전체 객실</div>
      <div class="kpi-val kpi-total-rooms"
           th:text="${kpi?.totalRooms ?: 0}">120</div>
      <div class="kpi-sub">전체 운영 중</div>
    </div>

    <div class="kpi-card green">
      <div class="kpi-label">현재 입실</div>
      <div class="kpi-val kpi-current-guests"
           th:text="${kpi?.currentGuests ?: 0}">87</div>
      <div class="kpi-sub up"
           th:text="'↑ 점유율 ' + (${kpi?.occupancyRate ?: 0}) + '%'">
        ↑ 점유율 72.5%
      </div>
    </div>

    <div class="kpi-card blue">
      <div class="kpi-label">오늘 체크인</div>
      <div class="kpi-val kpi-today-checkin"
           th:text="${kpi?.todayCheckIn ?: 0}">24</div>
      <div class="kpi-sub"
           th:text="'예정 +' + (${kpi?.upcomingCheckIn ?: 0}) + '건'">
        예정 +12건
      </div>
    </div>

    <div class="kpi-card red">
      <div class="kpi-label">재고 경고</div>
      <div class="kpi-val red kpi-stock-alert"
           th:text="${kpi?.stockAlert ?: 0}">3</div>
      <div class="kpi-sub danger">즉시 확인 필요</div>
    </div>
  </div>

  <div class="dash-grid">

    <!-- 예약 현황 -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">예약 현황 요약</span>
        <a class="btn btn-ghost btn-sm" th:href="@{/admin/reservation}">전체 보기</a>
      </div>

      <div class="card-body">
        <div class="donut-wrap"
             th:with="
       s=${resSummary != null ? resSummary.succeedRate : 0},
       w=${resSummary != null ? resSummary.waitedRate : 0},
       c=${resSummary != null ? resSummary.cancelledRate : 0}
     ">

          <svg width="110" height="110" viewBox="0 0 36 36">

            <!-- 배경 -->
            <circle cx="18" cy="18" r="15.9"
                    fill="none" stroke="#E8E6E0" stroke-width="3.2"/>

            <!-- 확정 -->
            <circle cx="18" cy="18" r="15.9"
                    fill="none" stroke="#1A1F2E" stroke-width="3.2"
                    th:attr="stroke-dasharray=${s + ' ' + (100 - s)}"
                    stroke-dashoffset="25"/>

            <!-- 대기 -->
            <circle cx="18" cy="18" r="15.9"
                    fill="none" stroke="#C8A96E" stroke-width="3.2"
                    th:attr="stroke-dasharray=${w + ' ' + (100 - w)},
                     stroke-dashoffset=${25 - s}"/>

            <!-- 취소 -->
            <circle cx="18" cy="18" r="15.9"
                    fill="none" stroke="#B52B2B" stroke-width="3.2"
                    th:attr="stroke-dasharray=${c + ' ' + (100 - c)},
                     stroke-dashoffset=${25 - s - w}"/>

            <text x="18" y="20" text-anchor="middle"
                  font-size="5.5" fill="#1A1F2E" font-weight="700">
              예약
            </text>

          </svg>

          <div class="donut-legend">
            <div class="legend-row">
              <span class="legend-dot" style="background:#1A1F2E"></span>
              확정 <span class="legend-val"
                       th:text="${(resSummary?.success ?: 0) + '건'}">54건</span>
            </div>

            <div class="legend-row">
              <span class="legend-dot" style="background:#C8A96E"></span>
              대기 <span class="legend-val"
                       th:text="${(resSummary?.waiting ?: 0) + '건'}">28건</span>
            </div>

            <div class="legend-row">
              <span class="legend-dot" style="background:#B52B2B"></span>
              취소 <span class="legend-val"
                       th:text="${(resSummary?.cancelled ?: 0) + '건'}">18건</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 재고 -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">재고 경고 알림</span>
        <a class="btn btn-ghost btn-sm" th:href="@{/admin/stock}">재고 관리</a>
      </div>

      <div class="card-body">
        <div class="alert-list">

          <div th:each="item : ${stockAlerts ?: {}}"
               th:classappend="${item.stockStatus == 'Shortage'} ? 'warn' : 'danger'"
               class="alert-row">
            <div class="alert-left">
              <span class="alert-name" th:text="${item.stockName}">수건</span>
              <span class="alert-detail"
                    th:text="'잔량 ' + ${item.stockCount} + '개 / 최소 ' + ${item.minStock} + '개'">
              </span>
            </div>
            <span class="badge"
                  th:classappend="${item.stockStatus == 'Shortage'} ? 'badge-yellow' : 'badge-red'"
                  th:text="${item.stockStatus == 'Shortage'} ? '경고' : '부족'">
            </span>
          </div>

          <div th:if="${#lists.isEmpty(stockAlerts)}"
               style="text-align:center;padding:20px;">
            재고 경고 없음
          </div>

        </div>
      </div>
    </div>

    <!-- 객실 상태 -->
    <div class="card span2">
      <div class="card-head"><span class="card-title">객실 현황</span></div>

      <div class="card-body">
        <div class="chart-bars">

          <div class="bar-col">
            <div class="bar-fill"
                 th:style="'height:' + (${roomSummary.occupiedRate ?: 0}) + '%'"></div>
            <div class="bar-lbl">체크인
              <span th:text="${roomSummary?.occupied ?: 0}">0</span>실
            </div>
          </div>

          <div class="bar-col">
            <div class="bar-fill gold"
                 th:style="'height:' + (${roomSummary.cleaningRequiredRate ?: 0}) + '%'"></div>
            <div class="bar-lbl">체크아웃대기
              <span th:text="${roomSummary?.cleaningRequired ?: 0}">0</span>실
            </div>
          </div>

          <div class="bar-col">
            <div class="bar-fill"
                 th:style="'height:' + (${roomSummary.cleaningRate ?: 0}) + '%;opacity:.45'"></div>
            <div class="bar-lbl">청소중
              <span th:text="${roomSummary?.cleaning ?: 0}">0</span>실
            </div>
          </div>

          <div class="bar-col">
            <div class="bar-fill"
                 th:style="'height:' + (${roomSummary?.maintenanceRate ?: 0}) + '%;background:linear-gradient(to top,#B52B2B,#E57373)'"></div>
            <div class="bar-lbl">점검중
              <span th:text="${roomSummary?.maintenance ?: 0}">0</span>실
            </div>
          </div>

          <div class="bar-col">
            <div class="bar-fill"
                 th:style="'height:' + (${roomSummary?.availableRate ?: 0}) + '%;opacity:.3'"></div>
            <div class="bar-lbl">공실
              <span th:text="${roomSummary?.available ?: 0}">0</span>실
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>

</main>
</body>
</html>
