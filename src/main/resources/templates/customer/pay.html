<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Hotel Kiosk - 호텔 안내</title>
    <!-- 토스페이먼츠 결제 위젯 SDK -->
    <script src="https://js.tosspayments.com/v1/payment-widget"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" th:href="@{/css/customer/kiosk.css}"> <!-- 공통 css -->
    <link rel="stylesheet" th:href="@{/css/customer/header_main.css}"> <!-- 메인 헤더 css -->
    <link rel="stylesheet" th:href="@{/css/customer/top_title.css}"> <!-- 최상단 타이틀 css -->
    <link rel="stylesheet" th:href="@{/css/customer/modal.css}"> <!-- 모달 css -->
    <link rel="stylesheet" th:href="@{/css/customer/numKeyboard.css}">

    <style>
        .kiosk {
            display: grid;
            grid-template-rows: auto auto 1fr auto;
        }

        /* 콘텐츠 영역 */
        .content-area {
            margin: 3cqw 4cqw 0;
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            gap: 2.5cqw;
            animation: fadeUp 0.4s ease both 0.25s;
            opacity: 0;
        }

        .content-area::-webkit-scrollbar {
            display: none;
        }

        /* 공통 카드 */
        .card {
            background: var(--surface);
            border-radius: 2cqw;
            border: 1px solid var(--border);
            box-shadow: 0 0.5cqw 2.5cqw var(--shadow);
            padding: 3.5cqw 4cqw;
            display: flex;
            flex-direction: column;
            gap: 2.5cqw;
            flex-shrink: 0;
        }

        .card-title {
            font-size: 3.8cqw;
            font-weight: 500;
            color: var(--text);
            letter-spacing: 0.02em;
        }

        /* 결제 수단 선택 */
        .pay-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2cqw;
        }

        .pay-method-btn {
            aspect-ratio: 2 / 1;
            background: var(--surface);
            border: 0.3cqw solid var(--border);
            border-radius: 2cqw;
            font-size: 3.2cqw;
            font-weight: 400;
            color: var(--text-sub);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pay-method-btn.active {
            border-color: var(--green);
            border-width: 0.4cqw;
            background: rgba(30, 77, 58, 0.05);
            color: var(--green);
            font-weight: 600;
        }

        /* 포인트 사용 */
        .point-avail {
            font-size: 2.8cqw;
            color: var(--text-sub);
            margin-top: -0.5cqw;
        }

        .point-input-row {
            display: flex;
            gap: 2cqw;
            align-items: center;
        }

        .point-input {
            flex: 1;
            font-size: 3cqw;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 1.2cqw;
            padding: 2cqw 2.5cqw;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .point-input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 0.4cqw rgba(30, 77, 58, 0.1);
            background: var(--surface);
        }

        .btn-point-use, .btn-point-cancel {
            font-size: 2.8cqw;
            font-weight: 500;
            border: none;
            border-radius: 1.2cqw;
            padding: 2cqw 3cqw;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-point-use {
            background: #2e2e2e;
            color: #fff;
            box-shadow: 0 0.3cqw 1cqw rgba(0, 0, 0, 0.18);
        }

        .btn-point-use:hover {
            background: #1a1a1a;
        }

        .btn-point-cancel {
            background: #e0e0e0;
            color: var(--text);
        }

        .btn-point-cancel:hover {
            background: #c8c8c8;
        }

        /* 결제 확인 */
        .bill-rows {
            display: flex;
            flex-direction: column;
            gap: 1.8cqw;
        }

        .bill-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .bill-item {
            display: flex;
            flex-direction: column;
            gap: 0.6cqw;
        }

        .bill-name {
            font-size: 3cqw;
            font-weight: 500;
            color: var(--text);
        }

        .bill-option {
            font-size: 2.4cqw;
            font-weight: 400;
            color: var(--text-sub);
            padding-left: 1cqw;
        }

        .bill-prices {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.6cqw;
        }

        .bill-price {
            font-size: 3.2cqw;
            font-weight: 600;
            color: var(--text);
        }

        .bill-price-sub {
            font-size: 2.6cqw;
            font-weight: 400;
            color: var(--text-sub);
        }

        .footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 2.5cqw 4cqw 3.5cqw;
            display: flex;
            flex-direction: column;
            gap: 1.8cqw;
            animation: fadeUp 0.4s ease both 0.35s;
            opacity: 0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-label {
            font-size: 2.8cqw;
            font-weight: 400;
            color: var(--text);
        }

        .summary-value {
            font-size: 2.8cqw;
            font-weight: 500;
            color: var(--text-sub);
        }

        .summary-total-label {
            font-size: 3.2cqw;
            font-weight: 500;
            color: var(--text);
        }

        .summary-total-value {
            font-size: 4cqw;
            font-weight: 700;
            color: var(--green);
        }

        .footer-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2cqw;
        }

        .btn-prev {
            font-size: 3.5cqw;
            font-weight: 500;
            color: #fff;
            background: #616060;
            border: none;
            border-radius: 1.8cqw;
            padding: 3cqw;
            cursor: pointer;
            box-shadow: 0 0.5cqw 2cqw rgba(0, 0, 0, 0.15);
            transition: all 0.2s ease;
        }

        .btn-prev:hover {
            background: #3a3a3a;
        }

        .btn-prev:active {
            transform: scale(0.99);
        }

        .btn-pay {
            font-size: 3.5cqw;
            font-weight: 500;
            color: #fff;
            background: var(--red);
            border: none;
            border-radius: 1.8cqw;
            padding: 3cqw;
            cursor: pointer;
            letter-spacing: 0.04em;
            box-shadow: 0 0.5cqw 2cqw rgba(192, 57, 43, 0.35);
            transition: all 0.2s ease;
        }

        .btn-pay:hover {
            background: var(--red-dark);
        }

        .btn-pay:active {
            transform: scale(0.99);
        }

        .footer {
            padding: 3cqw 4cqw 4cqw;
        }

        .btn-prev {
            width: 100%;
            font-size: 3.5cqw;
            font-weight: 500;
            color: #fff;
            background: #2e2e2e;
            border: none;
            border-radius: 2cqw;
            padding: 3cqw;
            cursor: pointer;
            letter-spacing: 0.06em;
            box-shadow: 0 1cqw 3cqw rgba(0, 0, 0, 0.18);
            transition: all 0.2s ease;
        }

        .btn-prev:hover {
            background: #1a1a1a;
            box-shadow: 0 1.5cqw 4cqw rgba(0, 0, 0, 0.28);
        }

        .btn-prev:active {
            transform: scale(0.99);
        }

        /* 입장 애니메이션 */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(2cqw);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            animation: fadeUp 0.4s ease both 0.05s;
            opacity: 0;
        }

        .page-title-bar {
            animation: fadeUp 0.4s ease both 0.15s;
            opacity: 0;
        }

        .content-area {
            animation: fadeUp 0.4s ease both 0.25s;
            opacity: 0;
        }

        .footer {
            animation: fadeUp 0.4s ease both 0.35s;
            opacity: 0;
        }

        /* 토스 결제 모달 */
        .toss-modal-box {
            background: var(--surface);
            border-radius: 2cqw;
            padding: 4cqw;
            width: 88cqw;
            max-height: 85vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2cqw;
        }

        .toss-modal-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2cqw;
            margin-top: 2cqw;
        }

        .btn-toss-cancel {
            font-size: 3cqw;
            font-weight: 500;
            background: #e0e0e0;
            color: var(--text);
            border: none;
            border-radius: 1.5cqw;
            padding: 2.5cqw;
            cursor: pointer;
        }

        .btn-toss-pay {
            font-size: 3cqw;
            font-weight: 600;
            background: #0064ff;
            color: #fff;
            border: none;
            border-radius: 1.5cqw;
            padding: 2.5cqw;
            cursor: pointer;
        }

        /* 포인트 */
        .point-display {
            flex: 1;
            font-family: 'Montserrat', sans-serif;
            font-size: 3cqw;
            font-weight: 600;
            color: var(--text);
            background: var(--bg);
            border: 1.5px solid var(--border) !important; /* 테두리 복구 */
            border-radius: 1.2cqw;
            padding: 2cqw 2.5cqw;
            min-height: 7cqw;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .point-display.active {
            border-color: var(--green);
            background: var(--surface);
            box-shadow: 0 0 0 0.5cqw rgba(30, 77, 58, 0.12);
        }

        /* 내부 INPUT 스타일: 껍데기 디자인은 부모가 하니까 input은 투명하게 */
        #ptDisplayVal {
            width: 100% !important;
            border: none !important;
            outline: none !important;
            background: transparent !important;
            padding: 0 !important;
            margin: 0 !important;
            font-family: inherit;
            font-size: inherit;
            font-weight: inherit;
            color: inherit;
            cursor: pointer;
            /* 클릭을 인식해야 하므로 반드시 auto여야 함 */
            pointer-events: auto !important;
        }

        #ptDisplayVal::placeholder {
            color: #ccc;
            font-weight: 400;
            font-size: 2.8cqw;
        }
    </style>
</head>
<body>

<div class="kiosk">

    <!-- 상단 네비 -->
    <div class="header">
        <div class="header-left">
            <button class="btn-home" onclick="goHome()">홈</button>
            <div class="tab-bar">
                <button class="tab active">호텔 안내</button>
            </div>
        </div>

        <button class="btn-back" onclick="goBack()">
            <svg class="back-icon" viewBox="0 0 24 24">
                <path d="M11.67 3.87L9.9 2.1 0 12l9.9 9.9 1.77-1.77L3.54 12z"/>
            </svg>
        </button>
    </div>

    <!-- 페이지 타이틀 바 -->
    <div class="page-title-bar">
        <div class="page-title-ko">결제</div>
        <div class="page-title-en">PAY</div>
    </div>

    <!-- 콘텐츠 영역 -->
    <div class="content-area">
        <!-- 결제 수단 선택 -->
        <div class="card">
            <span class="card-title">결제 수단 선택</span>
            <div class="pay-methods">
                <button class="pay-method-btn active" onclick="selectMethod(this)">카드</button>
                <button class="pay-method-btn" onclick="selectMethod(this)">페이</button>
            </div>
        </div>

        <!-- 포인트 사용 -->
        <div class="card">
            <span class="card-title">포인트 사용</span>
            <span class="point-avail">사용 가능 포인트 : <strong id="availPoint">2,600</strong>P</span>
            <div class="point-input-row">
                <div class="point-display" id="ptDisplay"
                     onclick="document.getElementById('ptDisplayVal').focus()">
                    <input class="input-field" id="ptDisplayVal"
                           type="text" placeholder="사용할 포인트를 입력해 주세요"
                           data-numpad readonly tabindex="0" maxlength="7"/>
                </div>
                <input type="hidden" id="pointInput" min="0" max="0"/>
                <button class="btn-point-use" onclick="usePoint()">사용</button>
                <button class="btn-point-cancel" onclick="cancelPoint()">취소</button>
            </div>
        </div>

        <!-- 결제 확인 -->
        <div class="card">
            <span class="card-title">결제 확인</span>
            <div class="bill-rows" id="billRows">
                <div class="bill-row">
                    <div class="bill-item">
                        <span class="bill-name">객실1</span>
                        <span class="bill-option">객실1 옵션</span>
                    </div>
                    <div class="bill-prices">
                        <span class="bill-price">250,000원</span>
                        <span class="bill-price-sub">120,000원</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="footer">
        <div class="summary-row">
            <span class="summary-label">할인 금액</span>
            <span class="summary-value" id="discountAmt">0원</span>
        </div>
        <div class="summary-row">
            <span class="summary-total-label">최종 결제 금액</span>
            <span class="summary-total-value" id="totalAmt"></span>
        </div>
        <div class="footer-btns">
            <button class="btn-prev" onclick="goBack()">이전으로</button>
            <button class="btn-pay" onclick="doPay()">결제하기</button>
        </div>
    </div>

    <!-- 포인트 결제 경고 모달 -->
    <div class="modal-overlay hidden" id="payAlertModal">
        <div class="modal-box">
            <span class="modal-msg" id="payAlertMsg"></span>
            <div class="modal-btns" style="grid-template-columns: 1fr;">
                <button class="btn-modal-yes" onclick="closePayAlert()">확 인</button>
            </div>
        </div>
    </div>

    <!-- 토스 결제 모달 -->
    <div class="modal-overlay hidden" id="tossModal">
        <div class="toss-modal-box">
            <div id="payment-widget"></div>
            <div id="agreement"></div>
            <div class="toss-modal-btns">
                <button class="btn-toss-cancel" onclick="closeTossModal()">닫기</button>
                <button class="btn-toss-pay" onclick="requestTossPay()">결제하기</button>
            </div>
        </div>
    </div>

    <!-- 영수증 출력 여부 모달 -->
    <div class="modal-overlay hidden" id="receiptConfirmModal">
        <div class="modal-box">
            <span class="modal-msg">결제가 완료되었습니다.<br>영수증을 출력하시겠습니까?</span>
            <div class="modal-btns">
                <button class="btn-modal-no" onclick="skipReceipt()">아니오</button>
                <button class="btn-modal-yes" onclick="showReceipt()">예</button>
            </div>
        </div>
    </div>

    <!-- 결제 실패 모달 -->
    <div class="modal-overlay hidden" id="payFailModal">
        <div class="modal-box">
            <span class="modal-msg" style="font-size:4cqw;">❌ 결제에 실패했습니다.</span>
            <div style="font-size:2.8cqw; color:var(--text-sub); text-align:center; line-height:2;">
                사유 : <span id="failMessage"></span><br>
                <span id="failCode" style="color:var(--red);"></span>
            </div>
            <div class="modal-btns" style="grid-template-columns: 1fr;">
                <button class="btn-modal-yes" onclick="closePayFailModal()">다시 시도</button>
            </div>
        </div>
    </div>

    <!-- 결제 완료 모달 -->
    <div class="modal-overlay hidden" id="payCompleteModal">
        <div class="modal-box">
            <span class="modal-msg" style="font-size:4cqw;">✅ 결제가 완료되었습니다.</span>
            <div style="font-size:2.8cqw; color:var(--text-sub); text-align:center; line-height:2;">
                결제 금액 : <span id="completeAmount" style="font-size:4cqw; font-weight:700; color:var(--green);"></span>
            </div>
            <div class="modal-btns" style="grid-template-columns: 1fr;">
                <button class="btn-modal-yes" onclick="window.location.href=getAfterPayUrl()">확 인</button>
            </div>
        </div>
    </div>

    <!-- 영수증 모달 -->
    <div class="modal-overlay hidden" id="receiptModal">
        <div class="modal-box">
            <span class="modal-msg">🧾 영수증</span>
            <div style="width:100%; font-size:3.2cqw; color:var(--text); line-height:2.2;">
                <div style="display:flex; justify-content:space-between;">
                    <span>예약번호</span>
                    <span id="receipt-reservationId"></span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span>객실</span>
                    <span id="receipt-roomName"></span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span>결제 수단</span>
                    <span id="receipt-payMethod"></span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span>객실 요금</span>
                    <span id="receipt-roomPrice"></span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span>옵션 요금</span>
                    <span id="receipt-optionCharge"></span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span>할인 금액</span>
                    <span id="receipt-discount"></span>
                </div>
                <div style="display:flex; justify-content:space-between; font-weight:700; border-top: 1px solid var(--border); padding-top: 1cqw; margin-top: 0.5cqw;">
                    <span>결제 금액</span>
                    <span id="receipt-total"></span>
                </div>
            </div>
            <div class="modal-btns">
                <button class="btn-modal-yes" style="grid-column: 1 / -1;"
                        onclick="goHomeFromReceipt()">확인
                </button>
            </div>
        </div>
    </div>

    <!-- 타임아웃 모달 -->
    <div class="modal-overlay hidden" id="timeoutModal">
        <div class="modal-box">
            <p><span id="timeoutSec">10</span>초 후<br>초기 화면으로 돌아갑니다.</p>
            <div class="modal-sub-msg">
                계속 진행하시려면 화면을 클릭해 주세요.
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/customer/header.js}"></script>
<script th:src="@{/js/customer/numKeyboard.js}"></script>
<script th:src="@{/js/customer/modal.js}"></script>
<script th:src="@{/js/customer/timeout.js}"></script>
<script>
    const newCheckoutDate = sessionStorage.getItem('newCheckoutDate')

    // 결제 완료 후 이동할 URL (재결제 또는 일반결제)
    function getAfterPayUrl() {
        return sessionStorage.getItem('afterPayUrl') || '/JHotel/main';
    }

    function showPayAlert(msg) {
        document.getElementById('payAlertMsg').textContent = msg
        document.getElementById('payAlertModal').classList.remove('hidden')
    }

    function closePayAlert() {
        document.getElementById('payAlertModal').classList.add('hidden')
    }

    function openPayFailModal(message, code) {
        document.getElementById('failMessage').textContent = message || '알 수 없는 오류'
        document.getElementById('failCode').textContent = code || ''
        document.getElementById('payFailModal').classList.remove('hidden')
        document.getElementById('tossModal').classList.add('hidden')
    }

    function closePayFailModal() {
        document.getElementById('payFailModal').classList.add('hidden')
    }

    function openPayCompleteModal(orderId, amount) {
        document.getElementById('completeAmount').textContent = Number(amount).toLocaleString() + '원'
        document.getElementById('payCompleteModal').classList.remove('hidden')
        document.getElementById('tossModal').classList.add('hidden')
    }

    let paymentWidget = null

    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

    // todo!!!!!! 포인트 사용 처리, 결제 수단 선택 active
    const selectedRooms = JSON.parse(sessionStorage.getItem('selectedRooms'))
    const guestInfo = JSON.parse(sessionStorage.getItem('guestInfo'))
    const preReservation = JSON.parse(sessionStorage.getItem('reservation'))

    fetch('/JHotel/pay', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', [csrfHeader]: csrfToken},
        body: JSON.stringify({
            memberPhone: guestInfo.guestPhone || guestInfo.memberPhone,
            memberBirth: guestInfo.guestBirth || guestInfo.memberBirth
        })
    })
        .then(res => {
            if (res.ok && res.headers.get('content-length') !== '0') {
                return res.json()
            }
            return null
        })
        .then(function (member) {
            if (member) {
                document.getElementById('availPoint').textContent = member.memberPoint.toLocaleString()
                document.getElementById('pointInput').max = member.memberPoint
            } else {
                document.getElementById('availPoint').textContent = '0'
                document.getElementById('pointInput').max = 0
            }
        })

    //  포인트 사용
    let appliedPoint = 0

    function usePoint() {
        const input = document.getElementById('pointInput')
        const maxPoint = parseInt(input.max) || 0

        var dv = document.getElementById('ptDisplayVal');
        let inputVal = parseInt(dv.value.replace(/[^0-9]/g, '')) || 0

        if (inputVal <= 0) {
            showPayAlert('사용할 포인트를 입력해주세요.')
            return
        }
        if (inputVal > maxPoint) {
            showPayAlert('사용 가능한 포인트를 초과했습니다.')
            inputVal = maxPoint
            dv.value = maxPoint.toLocaleString()
            return
        }

        appliedPoint = inputVal
        input.value = inputVal;

        // 원래 결제 금액 계산
        const roomPrice = parseInt(sessionStorage.getItem('roomPrice') || '0')
        const optionCharge = parseInt(sessionStorage.getItem('optionCharge') || '0')
        const originalTotal = roomPrice + optionCharge

        const finalTotal = Math.max(0, originalTotal - appliedPoint)

        document.getElementById('discountAmt').textContent = appliedPoint.toLocaleString() + '원'
        document.getElementById('totalAmt').textContent = finalTotal.toLocaleString() + '원'
    }

    function cancelPoint() {
        appliedPoint = 0
        ptInput = ''
        document.getElementById('pointInput').value = ''
        let dv = document.getElementById('ptDisplayVal')
        dv.style.color = '';
        dv.value = ''
        document.getElementById('ptDisplay').classList.remove('active')

        const roomPrice = parseInt(sessionStorage.getItem('roomPrice') || '0')
        const optionCharge = parseInt(sessionStorage.getItem('optionCharge') || '0')
        const originalTotal = roomPrice + optionCharge

        document.getElementById('discountAmt').textContent = '0원'
        document.getElementById('totalAmt').textContent = originalTotal.toLocaleString() + '원'
    }

    // 결제 수단 선택
    function selectMethod(btn) {
        document.querySelectorAll('.pay-method-btn').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
    }

    async function openTossModal() {
        document.getElementById('tossModal').classList.remove('hidden')
        if (!paymentWidget) {
            paymentWidget = PaymentWidget('test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm', PaymentWidget.ANONYMOUS)
            const amount = getTotalAmountRaw()
            await paymentWidget.renderPaymentMethods('#payment-widget', {value: amount})
            await paymentWidget.renderAgreement('#agreement')
        }
    }

    function closeTossModal() {
        document.getElementById('tossModal').classList.add('hidden')
    }

    // 최종 결제 금액을 숫자로 반환
    function getTotalAmountRaw() {
        const text = document.getElementById('totalAmt').textContent
        return parseInt(text.replace(/[^0-9]/g, ''), 10)
    }

    async function requestTossPay() {
        const amount = getTotalAmountRaw()
        const reservationIds = preReservation?.reservationIds || []
        const reservationId = reservationIds.join(',')
        const roomPrice = parseInt(sessionStorage.getItem('roomPrice') || '0') // *** 객실 요금 저장
        const optionCharge = parseInt(sessionStorage.getItem('optionCharge') || '0') // *** 옵션 요금 저장
        const pointAmount = parseInt(document.getElementById('pointInput').value || '0')
        const memberPhone = guestInfo?.guestPhone || guestInfo?.memberPhone || ''
        const memberBirth = guestInfo?.guestBirth || guestInfo?.memberBirth || ''
        const memberName = guestInfo?.guestName || guestInfo?.memberName || ''
        const orderId = 'HOTEL-' + Date.now()
        const paySource = sessionStorage.getItem('paySource') || 'onsite'

        const dateObj = new Date(newCheckoutDate);
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const day = String(dateObj.getDate()).padStart(2, '0');
        const newDate = `${year}-${month}-${day}`;

        try {
            const payResult = await paymentWidget.requestPayment({
                orderId: orderId,
                orderName: '호텔 객실 결제',
                customerName: guestInfo?.guestName || '고객',
                successUrl: window.location.origin
                    + '/JHotel/pay/toss/success'
                    + '?reservationId=' + encodeURIComponent(reservationId)
                    + '&roomPrice=' + roomPrice
                    + '&optionCharge=' + optionCharge
                    + '&pointAmount=' + pointAmount
                    + '&memberPhone=' + encodeURIComponent(memberPhone)
                    + '&memberBirth=' + encodeURIComponent(memberBirth)
                    + '&memberName=' + encodeURIComponent(memberName)
                    + '&paySource=' + paySource
                    + '&newCheckoutDate=' + newDate,
                failUrl: window.location.origin + '/JHotel/pay/toss/fail',
            })
            // 토스 SDK가 successUrl로 리다이렉트하기 전에 성공 처리
            // (successUrl 방식 유지 시 아래 코드는 실행 안 됨)
        } catch (e) {
            if (e.code === 'USER_CANCEL') return
            openPayFailModal(e.message, e.code)
        }
    }

    /* 객실 확인 정보 출력 */
    function renderPayRoomInfo() {
        const billRows = document.getElementById('billRows')
        let html = ''

        let totalSum = 0;
        let totalRoomPrice = 0;
        let totalOptionCharge = 0;
        const checkinDate = sessionStorage.getItem('checkinDate')
        const checkoutDate = sessionStorage.getItem('checkoutDate')

        // 숙박 박수 계산
        let period
        if (newCheckoutDate) {
            // 숙박 연장일 경우 (새 체크아웃 날짜 - 기존 체크아웃 날짜)
            const diffMs = new Date(newCheckoutDate) - new Date(preReservation.checkoutDate)
            period = Math.round(diffMs / (1000 * 60 * 60 * 24))
        } else {
            // 일반 예약일 경우 (체크아웃 날짜 - 체크인 날짜)
            period = (new Date(checkoutDate) - new Date(checkinDate)) / (1000 * 60 * 60 * 24)
        }

        for (let i = 0; i < selectedRooms.length; i++) {
            const r = selectedRooms[i]
            let optionHtml = ''
            let optionTotal = 0
            let hasOption = false

            for (const id in r.optionsQty) {
                if (r.optionsQty[id].qty > 0) {
                    hasOption = true
                    const option = r.optionsQty[id]
                    optionTotal += option.qty * option.optionPrice
                    optionHtml += `
                    <span class="bill-option">${option.optionName}</span>
                `
                }
            }

            if (!hasOption) {
                optionHtml = `<span class="bill-price-sub">- 옵션 선택 사항 없음</span>`
            }

            const currentRoomPrice = r.room.basePrice * period;
            totalRoomPrice += currentRoomPrice;
            totalOptionCharge += optionTotal;
            totalSum += (currentRoomPrice + optionTotal);

            html += `
            <div class="bill-row">
                <div class="bill-item">
                    <span class="bill-name">${r.room.roomName}</span>
                    ${optionHtml}
                </div>
                <div class="bill-prices">
                    <span class="bill-price">${(r.room.basePrice * period).toLocaleString()}원</span>
                    ${hasOption ? `<span class="bill-price-sub">옵션 +${optionTotal.toLocaleString()}원</span>` : ''}
                </div>
            </div>
        `
            document.getElementById('totalAmt').textContent = ((r.room.basePrice * period) + optionTotal).toLocaleString() + '원'
            sessionStorage.setItem('roomPrice', r.room.basePrice * period) // *** 객실 요금 저장
            sessionStorage.setItem('optionCharge', optionTotal) // *** 옵션 요금 저장
        }

        billRows.innerHTML = html
        document.getElementById('totalAmt').textContent = totalSum.toLocaleString() + '원'

        sessionStorage.setItem('roomPrice', totalRoomPrice)
        sessionStorage.setItem('optionCharge', totalOptionCharge)
    }

    renderPayRoomInfo()

    function doPay() {
        const activeBtn = document.querySelector('.pay-method-btn.active')
        const method = activeBtn ? activeBtn.textContent.trim() : ''

        if (method === '카드') {
            doCardPay() // 카드 결제 fetch 호출
        } else if (method === '페이') {
            openTossModal()
        } else {
            showPayAlert('결제 수단을 선택해주세요.')
        }
    }

    // 카드 결제 fetch -> 서버 저장 -> 영수증 모달
    function doCardPay() {
        const reservationIds = preReservation?.reservationIds || []
        const reservationId = reservationIds.join(',')
        const roomPrice = parseInt(sessionStorage.getItem('roomPrice') || '0')
        const optionCharge = parseInt(sessionStorage.getItem('optionCharge') || '0')
        const pointAmount = parseInt(document.getElementById('pointInput').value || '0')
        const totalCharge = getTotalAmountRaw()
        const memberPhone = guestInfo?.guestPhone || guestInfo?.memberPhone || ''
        const memberBirth = guestInfo?.guestBirth || guestInfo?.memberBirth || ''
        const memberName = guestInfo?.guestName || guestInfo?.memberName || ''
        const paySource = sessionStorage.getItem('paySource') || 'onsite'

        const dateObj = new Date(newCheckoutDate);
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const day = String(dateObj.getDate()).padStart(2, '0');
        const newDate = `${year}-${month}-${day}`;

        fetch('/JHotel/pay/card', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [csrfHeader]: csrfToken
            },
            body: JSON.stringify({
                reservationId, roomPrice, optionCharge,
                pointAmount, totalCharge, memberPhone, memberBirth, memberName,
                paySource, newCheckoutDate: newDate
            })
        })
            .then(res => res.text())
            .then(result => {
                if (result === 'success') {
                    openReceiptConfirmModal()  // 영수증 출력 여부 모달
                } else {
                    showPayAlert('결제 처리 중 오류가 발생했습니다.')
                }
            })
            .catch(() => showPayAlert('서버와 통신 중 오류가 발생했습니다.'))
    }

    // 영수증 출력 여부 모달 열기
    function openReceiptConfirmModal() {
        document.getElementById('receiptConfirmModal').classList.remove('hidden')
    }

    // 아니오 바로 홈으로
    function skipReceipt() {
        document.getElementById('receiptConfirmModal').classList.add('hidden')
        document.getElementById('payDoneModal').classList.remove('hidden')
    }

    function goHomeFromDone() {
        document.getElementById('payDoneModal').classList.add('hidden')
        window.location.href = getAfterPayUrl()
    }

    // 예 -> 영수증 모달
    function showReceipt() {
        document.getElementById('receiptConfirmModal').classList.add('hidden')

        const reservationIds = preReservation?.reservationIds || []
        const reservationId = reservationIds.join('\n') || '-'
        const roomName = selectedRooms?.[0]?.room?.roomName || '-'
        const payMethod = document.querySelector('.pay-method-btn.active')?.textContent.trim() || '-'
        const roomPrice = parseInt(sessionStorage.getItem('roomPrice') || '0')
        const optionCharge = parseInt(sessionStorage.getItem('optionCharge') || '0')
        const discountAmt = document.getElementById('discountAmt').textContent
        const totalAmt = document.getElementById('totalAmt').textContent

        document.getElementById('receipt-reservationId').textContent = reservationId
        document.getElementById('receipt-roomName').textContent = roomName
        document.getElementById('receipt-payMethod').textContent = payMethod
        document.getElementById('receipt-roomPrice').textContent = roomPrice.toLocaleString() + '원'
        document.getElementById('receipt-optionCharge').textContent = optionCharge.toLocaleString() + '원'
        document.getElementById('receipt-discount').textContent = discountAmt
        document.getElementById('receipt-total').textContent = totalAmt

        document.getElementById('receiptModal').classList.remove('hidden')
    }

    // 영수증 확인 후 홈으로
    function goHomeFromReceipt() {
        document.getElementById('receiptModal').classList.add('hidden')
        window.location.href = getAfterPayUrl();
    }

</script>

<!-- 결제 결과 모달 자동 오픈 (토스 리다이렉트 후) -->
<th:block th:if="${payResult == 'complete'}">
    <script>
        window.addEventListener('DOMContentLoaded', function () {
            openPayCompleteModal('[[${orderId}]]', '[[${amount}]]')
        })
    </script>
</th:block>
<th:block th:if="${payResult == 'fail'}">
    <script>
        window.addEventListener('DOMContentLoaded', function () {
            openPayFailModal('[[${message}]]', '[[${code}]]')
        })
    </script>
</th:block>
</body>
</html>
