<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Hotel Kiosk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" th:href="@{/css/customer/kiosk.css}"> <!-- 공통 css -->
    <link rel="stylesheet" th:href="@{/css/customer/2action_btns.css}"> <!-- 메인 버튼 2개 css -->
    <link rel="stylesheet" th:href="@{/css/customer/header_main.css}">
    <link rel="stylesheet" th:href="@{/css/customer/top_title.css}">
    <link rel="stylesheet" th:href="@{/css/customer/modal.css}">
    <link rel="stylesheet" th:href="@{/css/customer/numKeyboard.css}">

    <style>
        /* ── CENTER: 호텔명 + 버튼 + 설명 바 ── */
        .center-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5cqw;
            padding: 4cqw 5cqw;
            margin-bottom: 20cqw;
        }

        .hotel-name em {
            color: var(--green);
            font-style: normal;
        }

        /* ── 입력 카드 ── */
        .input-card {
            width: 100%;
            background: var(--surface);
            border-radius: 2.5cqw;
            border: 1px solid var(--border);
            box-shadow: 0 0.8cqw 4cqw var(--shadow);
            padding: 4cqw;
            display: flex;
            flex-direction: column;
            gap: 3cqw;
        }

        .input-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.2cqw;
            font-weight: 500;
            color: var(--text);
            letter-spacing: 0.02em;
        }

        /* ── 텍스트 입력 ── */
        .input-field {
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            font-size: 3.2cqw;
            font-weight: 500;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 1.5cqw;
            padding: 2.5cqw 3cqw;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            letter-spacing: 0.05em;
        }

        .input-field::placeholder {
            color: #bbb;
            font-weight: 400;
        }

        .input-field:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 0.4cqw rgba(30,77,58,0.1);
            background: var(--surface);
        }

        .reservation-input-wrap {
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
            border-radius: 1.5cqw;
            background: var(--bg);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .reservation-input-wrap:focus-within {
            border-color: var(--green);
            box-shadow: 0 0 0 0.4cqw rgba(30,77,58,0.1);
            background: var(--surface);
        }

        .reservation-front, .reservation-back {
            border: none;
            background: transparent;
            box-shadow: none;
            flex: 1;
            text-align: center;
        }

        .reservation-front:focus, .reservation-back:focus {
            border: none;
            box-shadow: none;
            background: transparent;
        }

        .reservation-dash {
            font-size: 3.2cqw;
            color: var(--text);
        }

        /* ── 예약 조회 버튼 ── */
        .btn-search {
            width: 100%;
            font-size: 4cqw;
            font-weight: 500;
            color: #fff;
            background: #2e2e2e;
            border: none;
            border-radius: 1.8cqw;
            padding: 3cqw;
            cursor: pointer;
            letter-spacing: 0.06em;
            box-shadow: 0 1cqw 3cqw rgba(0,0,0,0.18);
            transition: all 0.2s ease;
        }

        .btn-search:hover  { background: #1a1a1a; box-shadow: 0 1.5cqw 4cqw rgba(0,0,0,0.28); }
        .btn-search:active { transform: scale(0.99); }

        /* ── 안내 텍스트 바 ── */
        .guide-bar {
            width: 100%;
            margin: -1cqw 4cqw;
            background: #4a4a4a;
            border-radius: 1.2cqw;
            padding: 1.8cqw 3cqw;
            text-align: center;
            font-size: 3cqw; font-weight: 400;
            color: rgba(255,255,255,0.9);
            letter-spacing: 0.03em;
            animation: fadeUp 0.4s ease both 0.2s; opacity: 0;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0.4cqw rgba(30, 77, 58, 0.2);
            }
            50% {
                box-shadow: 0 0 0 0.8cqw rgba(30, 77, 58, 0.08);
            }
        }

        /* 입장 애니메이션 */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(2cqw);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            animation: fadeUp 0.5s ease both 0.05s;
            opacity: 0;
        }

    </style>
</head>
<body>

<div class="kiosk">
    <!-- 상단 네비 -->
    <div class="header">
        <div class="header-left">
            <button class="btn-home" onclick="goHome()">홈</button>
            <div class="tab-bar">
                <button class="tab active">호텔 안내</button>
            </div>
        </div>

        <button class="btn-back" onclick="goBack()">
            <svg class="back-icon" viewBox="0 0 24 24">
                <path d="M11.67 3.87L9.9 2.1 0 12l9.9 9.9 1.77-1.77L3.54 12z" />
            </svg>
        </button>
    </div>

    <!-- 중앙: 페이지 타이틀 + 예약번호 입력 카드 -->
    <div class="center-block">
        <!-- 페이지 타이틀 바 -->
        <div class="page-title-bar">
            <div class="page-title-ko">숙박 연장</div>
            <div class="page-title-en">EXTENDED-STAY</div>
        </div>

        <div class="input-card">
            <span class="input-label">예약 번호를 입력해 주세요.</span>
            <div class="reservation-input-wrap">
                <input class="input-field reservation-front" id="reservationFront"
                       type="text" maxlength="6"
                       data-numpad
                       data-numpad-group="resv"
                       data-numpad-part="front"
                       data-numpad-next="reservationBack"
                       readonly />
                <span class="reservation-dash">-</span>
                <input class="input-field reservation-back" id="reservationBack"
                       type="text" maxlength="6"
                       data-numpad
                       data-numpad-group="resv"
                       data-numpad-part="back"
                       data-numpad-confirm="searchReservation"
                       readonly />
            </div>
            <button class="btn-search" onclick="searchReservation()">예약 조회</button>
        </div>

        <div class="guide-bar">체크아웃 날짜가 지난 예약은 숙박 연장이 불가능합니다.</div>

    </div>
    <div class="bottom-spacer"></div>

    <!-- 예외처리 모달 -->
    <div class="modal-overlay hidden" id="exceptionModal">
        <div class="modal-box">
            <span class="modal-msg" style="white-space: pre-line;">해당 정보로 조회된 예약이 없습니다.</span>
            <div class="modal-btns" style="grid-template-columns: 1fr;">
                <button class="btn-modal-yes" onclick="closeModal('exceptionModal')">확 인</button>
                <!--// -->
            </div>
        </div>
    </div>

    <!-- 웨이크 워드 활성화 모달 -->
    <div class="modal-overlay hidden" id="aiWakeWord">
        <div class="modal-box">
            <div class="voice-bars" id="voiceBars">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>
            <span class="modal-msg" style="white-space: pre-line;">듣고 있습니다. 궁금하신 점을 말씀해주세요!</span>
        </div>
    </div>

    <!-- 타임아웃 모달 -->
    <div class="modal-overlay hidden" id="timeoutModal">
        <div class="modal-box">
            <p><span id="timeoutSec">10</span>초 후<br>메인 화면으로 돌아갑니다.</p>
            <div class="modal-sub-msg">
                계속 진행하시려면 화면을 클릭해 주세요.
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/customer/header.js}"></script>
<script th:src="@{/js/customer/2actionBtns.js}"></script>
<script th:src="@{/js/customer/numKeyboard.js}"></script>
<script th:src="@{/js/customer/modal.js}"></script>
<script th:src="@{/js/customer/ai_service/springai.js}"></script>
<script th:src="@{/js/customer/timeout.js}"></script>
<script>
    /* 뒤로가기로 접근(BFCache 복원)시, 애니메이션 효과 재실행 */
    window.addEventListener('pageshow', function (event) {
        if (event.persisted) {
            const animated = document.querySelectorAll(
                '.header, .guide-bar'
            )

            animated.forEach(el => {
                el.style.animation = 'none'
                el.style.opacity = '0'

                el.offsetHeight

                el.style.animation = ''
                el.style.opacity = ''
            })
        }
    })

    /* AI 채팅 서비스 호출 */
    springAi.wake.start();

    /* 이전 선택 정보 초기화 (세션에 저장된 정보 모두 초기화) */
    sessionStorage.removeItem('reservation')
    sessionStorage.removeItem('reservationDetail')

    /* 예약번호 앞 6자리 입력 후 뒤 칸 자동 포커스 */
    document.getElementById('reservationFront').addEventListener('input', function() {
        if (this.value.length === 6) {
            document.getElementById('reservationBack').focus();
        }
    });

    /* 예약 조회 */
    function searchReservation() {
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        // 예약번호 저장
        const reservation1stId = document.getElementById('reservationFront').value
        const reservation2ndId = document.getElementById('reservationBack').value

        if (!reservation1stId || !reservation2ndId) {
            openModal('exceptionModal')
            document.querySelector('.modal-msg').textContent = '예약 번호 형식이 올바르지 않습니다.\n다시 입력해 주세요.'
            return
        }

        const reservationId = reservation1stId + '-' + reservation2ndId

        fetch('/JHotel/extended/check_info', {
            method: 'POST',
            headers: {'Content-Type': 'application/json',  [csrfHeader]: csrfToken},
            body: JSON.stringify({reservationId: reservationId})
        })
            .then(res => res.text()
            )
            .then(function(text) {
                if (!text) {
                    openModal('exceptionModal')
                    document.querySelector('.modal-msg').textContent = '해당 사항이 없는 정보입니다.'
                    return
                }
                const reservation = JSON.parse(text)
                const reservationWithIds = Object.assign({}, reservation, { reservationIds: [reservation.reservationId] })
                sessionStorage.setItem('reservation', JSON.stringify(reservationWithIds))
                window.location.href = '/JHotel/extended/available'
            })

    }

</script>
</body>
</html>
